# ==========================================================
# Perfil DEV - MySQL local con WAMP
# ==========================================================
spring.datasource.url=jdbc:mysql://localhost:3306/tienda?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desactivamos la consola H2 porque ya no estamos usando H2
spring.h2.console.enabled=false
