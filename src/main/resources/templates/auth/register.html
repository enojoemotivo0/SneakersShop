<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle}, 'Crea tu cuenta en Snikers Shop')}"></head>
<body class="snk-grain">

<header th:replace="~{fragments/layout :: navbar}"></header>

<main>
    <section class="snk-section">
        <div class="snk-container" style="max-width: 560px;">
            <div class="snk-card">
                <div class="snk-text-center snk-mb-4">
                    <span class="text-tag" style="color: var(--snk-smoke);">Únete al club</span>
                    <h1 style="font-size: 2.5rem; margin-top: 0.5rem;">Crear <span class="accent">cuenta</span></h1>
                    <p style="color: var(--snk-smoke); margin-top: 0.5rem;">Drops exclusivos, descuentos y acceso anticipado</p>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form th:action="@{/register}" th:object="${user}" method="post" enctype="multipart/form-data">

                    <!-- Añadimos el campo para que suba su foto -->
                    <div class="snk-mb-3 text-center">
                        <label class="snk-form-label" style="display:block;">Foto de perfil</label>
                        <div id="register-avatar-preview" style="width: 80px; height: 80px; border-radius: 50%; background: #222; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--snk-border); cursor: pointer;" onclick="document.getElementById('register-photo-input').click()">
                            <svg id="register-avatar-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-person-fill text-secondary" viewBox="0 0 16 16">
                              <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3Zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
                            </svg>
                            <img id="register-avatar-img" src="" alt="Preview" style="display:none; width:100%; height:100%; object-fit:cover;">
                        </div>
                        <input type="file" id="register-photo-input" name="photoFile" accept="image/*" class="form-control form-control-sm" style="max-width: 250px; margin: 0 auto; background: var(--snk-dark); color: #fff; border-color: var(--snk-border);">
                    </div>

                    <div class="snk-mb-3">
                        <label class="snk-form-label">Nombre completo *</label>
                        <input type="text" th:field="*{fullName}" class="snk-form-control" required
                               placeholder="Nombre Apellidos">
                        <small th:if="${#fields.hasErrors('fullName')}" style="color: var(--snk-red); font-size: 0.75rem;"
                               th:errors="*{fullName}"></small>
                    </div>

                    <div class="snk-mb-3">
                        <label class="snk-form-label">Email *</label>
                        <input type="email" th:field="*{email}" class="snk-form-control" required
                               placeholder="tu@email.com">
                        <small th:if="${#fields.hasErrors('email')}" style="color: var(--snk-red); font-size: 0.75rem;"
                               th:errors="*{email}"></small>
                    </div>

                    <div class="snk-mb-3">
                        <label class="snk-form-label">Contraseña * (mínimo 8 caracteres)</label>
                        <input type="password" th:field="*{password}" class="snk-form-control" required minlength="8"
                               placeholder="••••••••">
                        <small th:if="${#fields.hasErrors('password')}" style="color: var(--snk-red); font-size: 0.75rem;"
                               th:errors="*{password}"></small>
                    </div>

                    <div class="snk-mb-3" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <label class="snk-form-label">Teléfono</label>
                            <input type="tel" th:field="*{phone}" class="snk-form-control" placeholder="+34 600 000 000">
                        </div>
                        <div>
                            <label class="snk-form-label">Dirección</label>
                            <input type="text" th:field="*{address}" class="snk-form-control" placeholder="Calle, número, ciudad">
                        </div>
                    </div>

                    <label class="snk-mb-3 d-flex gap-2 align-items-start text-mono" style="font-size: 0.8rem; color: var(--snk-smoke);">
                        <input type="checkbox" required style="margin-top: 0.25rem;">
                        <span>Acepto los términos y la política de privacidad de Snikers Shop</span>
                    </label>

                    <button type="submit" class="snk-btn snk-btn-dark w-100 justify-content-center snk-mt-2">
                        Crear mi cuenta <span class="arrow">→</span>
                    </button>
                </form>

                <div class="snk-text-center snk-mt-4 text-mono" style="font-size: 0.85rem; color: var(--snk-smoke);">
                    ¿Ya tienes cuenta?
                    <a th:href="@{/login}" style="color: var(--snk-black); font-weight: 700;">Inicia sesión</a>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
    // Previsualización inmediata de foto de perfil en el registro
    document.getElementById('register-photo-input').addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
            document.getElementById('register-avatar-icon').style.display = 'none';
            const img = document.getElementById('register-avatar-img');
            img.src = e.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(file);
    });
</script>
</body>
</html>
