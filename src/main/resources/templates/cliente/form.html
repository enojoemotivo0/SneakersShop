<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    <header th:replace="~{fragments/nav :: nav}"></header>

    <div class="page-header">
        <div class="container">
            <h1 th:text="${cliente.id == null ? 'Nuevo Cliente' : 'Editar Cliente'}">Cliente</h1>
            <p class="subtitle">Registra los datos del cliente</p>
        </div>
    </div>

    <main class="container" style="padding-bottom:60px;">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="form-card">
                    <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="field-group mb-0">
                                    <label for="nombre" class="field-label">Nombre</label>
                                    <input type="text" class="field-input" id="nombre" th:field="*{nombre}" required placeholder="Nombre">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="field-group mb-0">
                                    <label for="apellidos" class="field-label">Apellidos</label>
                                    <input type="text" class="field-input" id="apellidos" th:field="*{apellidos}" placeholder="Apellidos">
                                </div>
                            </div>
                        </div>

                        <div class="row g-3" style="margin-top:4px;">
                            <div class="col-md-6">
                                <div class="field-group mb-0">
                                    <label for="email" class="field-label">Email</label>
                                    <input type="email" class="field-input" id="email" th:field="*{email}" placeholder="email@ejemplo.com">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="field-group mb-0">
                                    <label for="telefono" class="field-label">Teléfono</label>
                                    <input type="text" class="field-input mono" id="telefono" th:field="*{telefono}" placeholder="123 456 789">
                                </div>
                            </div>
                        </div>

                        <div class="field-group">
                            <label for="direccion" class="field-label">Dirección</label>
                            <input type="text" class="field-input" id="direccion" th:field="*{direccion}" placeholder="Calle, número, ciudad">
                        </div>

                        <div class="field-group">
                            <label for="tipo" class="field-label">Tipo de cliente</label>
                            <select class="field-input" id="tipo" th:field="*{tipo}">
                                <option value="Regular">Regular</option>
                                <option value="Premium">Premium</option>
                                <option value="VIP">VIP</option>
                            </select>
                        </div>

                        <div style="display:flex; gap:10px; margin-top:8px; flex-wrap:wrap;">
                            <button type="submit" class="btn-ink" style="padding:12px 28px;">
                                <i class="bi bi-check-lg"></i> Guardar cliente
                            </button>
                            <a href="/clientes" class="btn-ghost" style="padding:12px 22px;">
                                <i class="bi bi-x-lg"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
