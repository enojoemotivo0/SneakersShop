<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${pageTitle}, 'Gesti�n de clientes y usuarios')}"></head>
<body class="snk-grain">

<header th:replace="~{fragments/layout :: navbar}"></header>

<main>
    <section class="snk-section">
        <div class="snk-container">
            <div class="snk-section-header">
                <div>
                    <span class="text-tag" style="color: var(--snk-red);">� Admin �</span>
                    <h1>Clientes & Usuarios</h1>
                </div>
            </div>

            <nav th:replace="~{admin/admin-nav :: adminNav('users')}"></nav>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;" class="admin-cat-layout">
                <!-- Lista -->
                <div class="snk-card" style="padding: 0;">
                    <table class="snk-table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Foto</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Registro</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u, iterStat : ${users}" style="vertical-align: middle;">
                            <td class="fw-bold" th:text="'#' + ${iterStat.count}"></td>
                            <td>
                                <img th:if="${u.profilePicture != null}" 
                                     th:src="${u.profilePicture}" 
                                     alt="Perfil" 
                                     style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd;">
                                <svg th:unless="${u.profilePicture != null}" xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ccc" class="bi bi-person-circle" viewBox="0 0 16 16">
                                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                                    <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
                                </svg>
                            </td>
                            <td th:text="${u.fullName}"></td>
                            <td th:text="${u.email}"></td>
                            <td th:text="${u.role.name() == 'ADMIN' ? 'Administrador' : 'Cliente'}"></td>
                            <td th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}"></td>
                            <td>
                                <!-- No permitir borrar al propio usuario logueado -->
                                <form th:unless="${#authentication.name == u.email}"
                                      th:action="@{/admin/users/{id}/delete(id=${u.id})}"
                                      method="post"
                                      onsubmit="return confirm('¿Seguro que quieres eliminar a ' + this.dataset.name + '? Se borrarán también sus pedidos.');"
                                      th:data-name="${u.fullName}">
                                    <button type="submit" class="snk-btn" style="background:var(--snk-red);color:#fff;padding:0.3rem 0.8rem;font-size:0.8rem;">Eliminar</button>
                                </form>
                                <span th:if="${#authentication.name == u.email}" class="text-muted small">Tú</span>
                            </td>
                        </tr>
                        <tr th:if="${users.isEmpty()}">
                            <td colspan="7" style="text-align: center; padding: 2rem;">No hay clientes registrados a�n.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Formulario -->
                <div>
                    <div class="snk-card sticky-top" style="top: 100px;">
                        <h4 class="mb-4 text-uppercase fw-bold">Añadir Cliente</h4>

                        <form th:action="@{/admin/users}" method="post" th:object="${user}" enctype="multipart/form-data">
                            
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Nombre Completo *</label>
                                <input type="text" class="form-control" th:field="*{fullName}" required>
                                <span class="text-danger small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Email *</label>
                                <input type="email" class="form-control" th:field="*{email}" required>
                                <span class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Contraseña *</label>
                                <input type="password" class="form-control" th:field="*{password}" required>
                                <span class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Teléfono</label>
                                <input type="text" class="form-control" th:field="*{phone}">
                            </div>

                            <div class="mb-4">
                                <label class="form-label small fw-bold">Dirección</label>
                                <input type="text" class="form-control" th:field="*{address}">
                            </div>

                            <div class="mb-4">
                                <label class="form-label small fw-bold">Foto de Perfil</label>
                                <!-- Preview del avatar antes de guardar -->
                                <div id="admin-avatar-wrap" style="width:72px;height:72px;border-radius:50%;overflow:hidden;background:#222;display:flex;align-items:center;justify-content:center;margin-bottom:0.5rem;cursor:pointer;border:2px dashed #555;" onclick="document.getElementById('admin-photo-input').click()">
                                    <svg id="admin-avatar-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="#aaa" viewBox="0 0 16 16">
                                      <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3Zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
                                    </svg>
                                    <img id="admin-avatar-img" src="" alt="Preview" style="display:none;width:100%;height:100%;object-fit:cover;">
                                </div>
                                <input type="file" id="admin-photo-input" class="form-control" name="photoFile" accept="image/*">
                                <small class="text-muted d-block mt-1">Opcional. Se mostrará en el avatar de la barra superior.</small>
                            </div>

                            <div class="mb-4">
                                <label class="form-label small fw-bold">Rol *</label>
                                <select class="form-select" th:field="*{role}">
                                    <option value="CLIENTE">Cliente</option>
                                    <option value="ADMINISTRADOR">Administrador</option>
                                </select>
                            </div>

                            <button type="submit" class="snk-btn snk-btn-dark w-100">Guardar Usuario</button>
                        </form>
                    </div>
                </div>
            </div>

            <style>
                @media (max-width: 900px) {
                    .admin-cat-layout { grid-template-columns: 1fr !important; }
                }
            </style>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
    // Previsualización inmediata de foto de perfil en el panel admin
    document.getElementById('admin-photo-input').addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
            document.getElementById('admin-avatar-icon').style.display = 'none';
            const img = document.getElementById('admin-avatar-img');
            img.src = e.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(file);
    });
</script>
</body>
</html>
