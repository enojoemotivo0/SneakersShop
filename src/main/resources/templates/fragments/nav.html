<nav th:fragment="nav" class="site-nav" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="nav-inner">
        <a class="nav-brand" href="/"><i class="bi bi-lightning-charge-fill me-1"></i>Sneakers</a>

                    <i class="bi bi-gear-fill"></i> Admin <i class="bi bi-chevron-down" style="font-size:0.6rem;"></i>
                </span>
                <div class="admin-menu">
                    <a href="/productos"><i class="bi bi-box-seam"></i> Inventario</a>
