<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    <header th:replace="~{fragments/nav :: nav}"></header>

    <div class="page-header">
        <div class="container">
            <h1><i class="bi bi-bag me-2"></i>Mi Carrito</h1>
            <p class="subtitle">Revisa tus artículos antes de finalizar</p>
        </div>
    </div>

    <main class="container" style="padding-bottom: 60px;">

        <div th:if="${detalles == null or detalles.isEmpty()}" style="text-align:center; padding: 80px 20px;">
            <i class="bi bi-bag-x" style="font-size:4rem; opacity:0.2; display:block; margin-bottom:20px;"></i>
            <h3 style="font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.05em; margin-bottom:12px;">Tu carrito está vacío</h3>
            <p style="color:var(--mid); margin-bottom:28px;">Aún no has añadido ningún producto.</p>
            <a th:href="@{/}" class="btn-ink">
                <i class="bi bi-grid-3x3-gap"></i> Explorar productos
            </a>
        </div>

        <div class="row g-4" th:unless="${detalles == null or detalles.isEmpty()}">
            <!-- Items -->
            <div class="col-lg-8">
                <div class="section-label mb-3">
                    <span th:text="${detalles.size()}">0</span> artículo(s)
                </div>

                <div th:each="detalle : ${detalles}" style="background:#fff; border:1.5px solid var(--border); border-radius:4px; padding:16px 20px; margin-bottom:12px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
                    <div style="width:72px; height:72px; background:var(--cream); border-radius:4px; overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center;">
                        <img th:src="${detalle.producto.imagenUrl}" alt="Imagen" style="max-width:100%; max-height:100%; object-fit:contain; padding:4px;">
                    </div>
                    <div style="flex:1; min-width:160px;">
                        <h6 style="font-weight:700; margin-bottom:2px;" th:text="${detalle.producto.nombre}">Nombre</h6>
                        <div style="font-size:0.75rem; color:var(--mid); margin:0; display:flex; align-items:center; gap:8px;">
                            <span th:text="${detalle.producto.categoria != null ? detalle.producto.categoria.nombre : '—'}">Categoría</span>
                            <form th:if="${detalle.producto.talla != null and !#strings.isEmpty(detalle.producto.talla)}" th:action="@{/carrito/updateTalla}" method="post" style="margin:0;">
                                <input type="hidden" name="id" th:value="${detalle.id}">
                                <span>| Talla: </span>
                                <select name="talla" onchange="this.form.submit()" style="padding:2px 5px; font-size:0.75rem; border-radius:3px; border:1px solid #ccc; background:#fff;">
                                    <option th:each="t : ${#strings.arraySplit(detalle.producto.talla, ',')}" 
                                            th:value="${#strings.trim(t)}" 
                                            th:text="${#strings.trim(t)}"
                                            th:selected="${detalle.talla != null and #strings.trim(t) == detalle.talla}"></option>
                                </select>
                            </form>
                        </div>
                    </div>
                    <div style="text-align:center; min-width:80px;">
                        <p class="section-label mb-1">Precio unit.</p>
                        <span class="mono" style="font-size:0.95rem; font-weight:700;" th:text="'$' + ${detalle.precio}">$0</span>
                    </div>
                    <div style="text-align:center; min-width:60px;">
                        <p class="section-label mb-1">Cant.</p>
                        <span style="font-weight:700; font-size:1rem;" th:text="${detalle.cantidad}">1</span>
                    </div>
                    <div>
                        <a th:href="@{/carrito/delete/{id}(id=${detalle.id})}" class="btn-danger" style="font-size:0.68rem; padding:7px 12px;">
                            <i class="bi bi-trash3"></i> Quitar
                        </a>
                    </div>
                </div>
            </div>

            <!-- Summary -->
            <div class="col-lg-4">
                <div style="background:var(--ink); color:var(--paper); border-radius:4px; padding:28px; position:sticky; top:72px;">
                    <h4 style="font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:0.05em; margin-bottom:20px; color:var(--acid);">Resumen</h4>

                    <div style="display:flex; justify-content:space-between; font-size:0.82rem; color:rgba(255,255,255,0.5); margin-bottom:10px;">
                        <span>Artículos</span>
                        <span th:text="${detalles.size()}">0</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:0.82rem; color:rgba(255,255,255,0.5); margin-bottom:20px;">
                        <span>Envío</span>
                        <span>Calculado en checkout</span>
                    </div>

                    <div style="height:1px; background:rgba(255,255,255,0.1); margin-bottom:20px;"></div>

                    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:28px;">
                        <span style="font-size:0.78rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;">Total</span>
                        <span class="mono" style="font-size:1.6rem; font-weight:700; color:var(--acid);" th:text="'$' + ${pedido.total}">$0</span>
                    </div>

                    <a th:href="@{/carrito/checkout}" class="btn-ink w-100 justify-content-center" style="background:var(--acid); color:var(--ink); border-color:var(--acid); padding:14px; font-size:0.82rem; margin-bottom:10px;">
                        <i class="bi bi-lock-fill"></i> Finalizar compra
                    </a>
                    <a th:href="@{/}" class="btn-ghost w-100 justify-content-center" style="border-color:rgba(255,255,255,0.2); color:rgba(255,255,255,0.6); padding:11px; font-size:0.75rem;">
                        <i class="bi bi-arrow-left"></i> Seguir comprando
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
