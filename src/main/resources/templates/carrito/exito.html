<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    <header th:replace="~{fragments/nav :: nav}"></header>

    <main class="container" style="padding: 80px 24px; text-align:center;">
        <!-- Success animation area -->
        <div style="max-width:540px; margin:0 auto;">
            <div style="width:96px; height:96px; background:var(--acid); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 28px; font-size:2.5rem; color:var(--ink);">
                <i class="bi bi-check-lg"></i>
            </div>

            <p class="section-label mb-2" style="color:var(--mid);">Pago completado</p>
            <h1 style="font-family:'Bebas Neue',sans-serif; font-size:3.5rem; letter-spacing:0.04em; margin-bottom:12px;">¡Pedido Confirmado!</h1>
            <p style="color:var(--mid); font-size:0.95rem; margin-bottom:40px; line-height:1.6;">
                Tu pedido ha sido procesado correctamente. Te enviaremos los detalles a tu correo en breve.
            </p>

            <!-- Order summary box -->
            <div style="background:var(--ink); color:var(--paper); border-radius:4px; padding:32px; text-align:left; margin-bottom:32px;">
                <h5 style="font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:0.06em; color:var(--acid); margin-bottom:20px;">Resumen del pedido</h5>
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.08); font-size:0.85rem;">
                    <span style="color:rgba(255,255,255,0.4); letter-spacing:0.06em; font-size:0.72rem; text-transform:uppercase; font-weight:700;">Número de pedido</span>
                    <span class="mono" style="color:var(--acid); font-weight:700;">#<span th:text="${pedidoId}">000</span></span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:10px 0; font-size:0.85rem;">
                    <span style="color:rgba(255,255,255,0.4); letter-spacing:0.06em; font-size:0.72rem; text-transform:uppercase; font-weight:700;">Total pagado</span>
                    <span class="mono" style="font-size:1.3rem; font-weight:700; color:#fff;">$<span th:text="${#numbers.formatDecimal(pedidoTotal, 1, 2)}">0.00</span></span>
                </div>
            </div>

            <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                <a th:href="@{/carrito/factura/{id}(id=${pedidoId})}" class="btn-danger" target="_blank" style="padding:12px 22px; font-size:0.78rem;">
                    <i class="bi bi-file-earmark-pdf"></i> Descargar Factura PDF
                </a>
                <a th:href="@{/}" class="btn-ghost" style="padding:12px 22px; font-size:0.78rem;">
                    <i class="bi bi-grid-3x3-gap"></i> Volver al inicio
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
