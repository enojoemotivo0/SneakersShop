<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle}, 'Mis pedidos')}"></head>
<body class="snk-grain">

<header th:replace="~{fragments/layout :: navbar}"></header>

<main>
    <section class="snk-section">
        <div class="snk-container">
            <div class="snk-section-header">
                <div>
                    <span class="text-tag">Mi cuenta</span>
                    <h1>Mis <span class="accent">pedidos</span></h1>
                </div>
                <a th:href="@{/products}" class="snk-link-arrow">Seguir comprando →</a>
            </div>

            <div th:if="${orders.isEmpty()}" class="snk-card snk-text-center" style="padding: 4rem 2rem;">
                <h3>Todavía no tienes pedidos</h3>
                <p class="snk-mt-2" style="color: var(--snk-smoke);">
                    Cuando realices tu primera compra, aparecerá aquí.
                </p>
                <a th:href="@{/products}" class="snk-btn snk-btn-dark snk-mt-3">
                    Explorar catálogo <span class="arrow">→</span>
                </a>
            </div>

            <div th:if="${!orders.isEmpty()}" class="snk-card" style="padding: 0;">
                <table class="snk-table">
                    <thead>
                    <tr>
                        <th>Pedido</th>
                        <th>Fecha</th>
                        <th>Artículos</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td><strong class="text-mono" th:text="${order.orderNumber}">SNK-000</strong></td>
                        <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2025</td>
                        <td th:text="${order.items.size()}">0</td>
                        <td>
                            <strong th:text="${#numbers.formatDecimal(order.total, 1, 2)} + ' €'">0€</strong>
                        </td>
                        <td>
                            <span th:class="'snk-badge snk-badge-' + ${#strings.toLowerCase(order.status.name())}"
                                  th:text="${order.status.name()}">PENDING</span>
                        </td>
                        <td>
                            <a th:href="@{/orders/{id}(id=${order.id})}" class="snk-link-arrow" style="font-size: 0.75rem;">Ver →</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
