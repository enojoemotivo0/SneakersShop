# ==========================================================
# Snikers Shop — Configuración principal
# ==========================================================
spring.application.name=snikers-shop
server.port=8080

# Perfil activo por defecto (H2 en memoria para desarrollo rápido)
spring.profiles.active=dev

# ==========================================================
# Thymeleaf
# ==========================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ==========================================================
# Logging
# ==========================================================
logging.level.org.springframework=INFO
logging.level.com.snikers=DEBUG

# ==========================================================
# Tamaños de subida (para futuras subidas de imágenes)
# ==========================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================================
# Formato JSON
# ==========================================================
spring.jackson.serialization.write-dates-as-timestamps=false
