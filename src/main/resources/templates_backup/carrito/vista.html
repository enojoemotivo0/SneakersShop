<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    <header th:replace="~{fragments/nav :: nav}"></header>

    <main class="container my-5">
        <h2 class="mb-4">Mi Carrito de Compras</h2>

        <div th:if="${detalles == null or detalles.isEmpty()}" class="alert alert-info text-center">
            Tu carrito está vacío. <a th:href="@{/}" class="alert-link">Haz clic aquí para seguir comprando</a>.
        </div>

        <div class="row" th:unless="${detalles == null or detalles.isEmpty()}">
            <div class="col-md-8">
                <div class="card shadow-sm border-0 mb-3" th:each="detalle : ${detalles}">
                    <div class="row g-0 align-items-center p-3">
                        <div class="col-md-2 text-center">
                            <img th:src="${detalle.producto.imagenUrl}" class="img-fluid rounded" alt="Imagen" style="max-height: 80px;">
                        </div>
                        <div class="col-md-4">
                            <h5 class="card-title mb-0" th:text="${detalle.producto.nombre}">Nombre</h5>
                            <small class="text-muted" th:text="${detalle.producto.categoria.nombre}">Categoría</small>
                        </div>
                        <div class="col-md-2 text-center">
                            <span class="fs-6" th:text="${'$' + detalle.precio}">$0.00</span>
                        </div>
                        <div class="col-md-2 text-center">
                            <span class="badge bg-light text-dark border px-3 py-2 fs-6">Cant: <span th:text="${detalle.cantidad}">1</span></span>
                        </div>
                        <div class="col-md-2 text-end">
                            <a th:href="@{/carrito/delete/{id}(id=${detalle.id})}" class="btn btn-danger btn-sm rounded-pill">
                                <i class="bi bi-trash"></i> Quitar
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm border-0 bg-light">
                    <div class="card-body">
                        <h4 class="card-title mb-4">Resumen del pedido</h4>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Total de articulos:</span>
                            <span th:text="${detalles.size()}">0</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fs-5 fw-bold">Total a pagar:</span>
                            <span class="fs-5 fw-bold text-success" th:text="${'$' + pedido.total}">$0.00</span>
                        </div>
                        <a th:href="@{/carrito/checkout}" class="btn btn-success w-100 btn-lg rounded-pill">Proceder al pago</a>
                        <a th:href="@{/}" class="btn btn-outline-dark w-100 mt-2 rounded-pill">Seguir comprando</a>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
