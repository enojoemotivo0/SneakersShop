<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    <header th:replace="~{fragments/nav :: nav}"></header>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h2 th:text="${producto.id == null ? 'Nuevo Producto' : 'Editar Producto'}">Formulario</h2>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/productos/guardar}" th:object="${producto}" method="post" enctype="multipart/form-data">
                            <input type="hidden" th:field="*{id}" />
                            <input type="hidden" th:field="*{imagenUrl}" />

                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="nombre" th:field="*{nombre}" th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="descripcion" class="form-label">Descripción</label>
                                <textarea class="form-control" id="descripcion" th:field="*{descripcion}" rows="3" th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid' : ''"></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="precio" class="form-label">Precio</label>
                                    <input type="number" step="0.01" class="form-control" id="precio" th:field="*{precio}" th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="stock" class="form-label">Stock</label>
                                    <input type="number" class="form-control" id="stock" th:field="*{stock}" th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="categoria" class="form-label">Categoría</label>
                                    <select class="form-select" id="categoria" th:field="*{categoria}" th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid' : ''">
                                        <option value="">Seleccione una categoría</option>
                                        <option th:each="cat : ${categorias}" 
                                                th:value="${cat.id}" 
                                                th:text="${cat.nombre}">
                                            Categoría
                                        </option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="talla" class="form-label">Talla</label>
                                    <input type="text" class="form-control" id="talla" th:field="*{talla}" th:classappend="${#fields.hasErrors('talla')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('talla')}" th:errors="*{talla}"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="file" class="form-label">Subir Imagen desde el PC</label>
                                <input type="file" class="form-control" id="file" name="file" accept="image/*">
                                
                                <div th:if="${producto.imagenUrl != null and !producto.imagenUrl.isEmpty()}" class="mt-2">
                                    <p class="text-muted small">Imagen actual:</p>
                                    <img th:src="${producto.imagenUrl}" alt="Imagen del producto" style="max-width: 150px; border-radius: 8px;">
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">Guardar</button>
                            <a href="/productos" class="btn btn-secondary">Cancelar</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
