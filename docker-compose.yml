# ============================================================
# Snikers Shop — Docker Compose
# Servicios: app (Spring Boot) + db (MySQL 8) + phpmyadmin (opcional)
# Red aislada: snikers-net
# Volumen persistente: snikers-db-data
# ============================================================

services:

  # -------- Base de datos MySQL --------
  db:
    image: mysql:8.0
    container_name: snikers-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass_2024
      MYSQL_DATABASE: snikersdb
      MYSQL_USER: snikers
      MYSQL_PASSWORD: snikers_pass_2024
    ports:
      - "3307:3306"   # expuesto en 3307 local para no chocar con MySQL nativo
    volumes:
      - snikers-db-data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    networks:
      - snikers-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usnikers", "-psnikers_pass_2024"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -------- Aplicación Spring Boot --------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snikers-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: snikersdb
      DB_USER: snikers
      DB_PASSWORD: snikers_pass_2024
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8080:8080"
    networks:
      - snikers-net

  # -------- phpMyAdmin (opcional, para inspección en desarrollo) --------
  phpmyadmin:
    image: phpmyadmin:5
    container_name: snikers-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: snikers
      PMA_PASSWORD: snikers_pass_2024
    ports:
      - "8081:80"
    networks:
      - snikers-net

# -------- Red aislada --------
networks:
  snikers-net:
    driver: bridge

# -------- Volumen persistente para la BD --------
volumes:
  snikers-db-data:
    driver: local
