<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    <header th:replace="~{fragments/nav :: nav}"></header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="mb-4">Finalizar Compra</h2>
                
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h5 class="card-title text-success mb-3">
                            Monto a pagar: <span th:text="${'$' + pedido.total}">$0.00</span>
                        </h5>
                        <p class="text-muted">Por favor, rellena tus datos para enviar tu pedido. (Esto es una simulación).</p>
                        
                        <form th:action="@{/carrito/procesarPago}" method="post">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control" name="nombre" id="nombre" required placeholder="Ej: Juan Pérez">
                            </div>
                            <div class="mb-3">
                                <label for="direccion" class="form-label">Dirección de Envío</label>
                                <input type="text" class="form-control" name="direccion" id="direccion" required placeholder="Ej: Calle Principal 123">
                            </div>
                            
                            <hr class="my-4">
                            <h5 class="mb-3">Método de Pago</h5>
                            
                            <div class="mb-3">
                                <label for="tarjeta" class="form-label">Número de Tarjeta</label>
                                <input type="text" class="form-control" id="tarjeta" maxlength="16" required placeholder="1234 5678 1234 5678">
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="vencimiento" class="form-label">Fecha de Vencimiento</label>
                                    <input type="text" class="form-control" id="vencimiento" required placeholder="MM/AA">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="cvv" class="form-label">Código de Seguridad (CVV)</label>
                                    <input type="text" class="form-control" id="cvv" maxlength="3" required placeholder="123">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg mt-3 rounded-pill">
                                Confirmar y Pagar
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="mt-3 text-center">
                    <a th:href="@{/carrito}" class="text-decoration-none text-muted">Volver al carrito</a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
