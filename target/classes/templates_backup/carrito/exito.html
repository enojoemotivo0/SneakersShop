<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    <header th:replace="~{fragments/nav :: nav}"></header>

    <main class="container my-5 text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 py-5">
                    <div class="card-body">
                        <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                        <h2 class="mt-4 fw-bold">¡Pago Exitoso!</h2>
                        <p class="fs-5 mt-3 text-muted">Tu pedido ha sido procesado correctamente.</p>
                        
                        <div class="alert alert-light border my-4">
                            <h4 class="mb-3">Resumen de tu compra</h4>
                            <p class="mb-1"><strong>Número de Pedido:</strong> #<span th:text="${pedidoId}">000</span></p>
                            <p class="mb-1"><strong>Total Pagado:</strong> $<span th:text="${#numbers.formatDecimal(pedidoTotal, 1, 2)}">0.00</span></p>
                        </div>
                        
                        <p>Te enviaremos los detalles de tu envío en breve.</p>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                            <a th:href="@{/carrito/factura/{id}(id=${pedidoId})}" class="btn btn-danger btn-lg px-4 me-md-2" target="_blank">
                                <i class="bi bi-file-earmark-pdf"></i> Descargar Factura PDF
                            </a>
                            <a th:href="@{/}" class="btn btn-outline-dark btn-lg px-4">
                                Volver al inicio
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
