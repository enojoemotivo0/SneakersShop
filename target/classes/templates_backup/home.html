<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    <header th:replace="~{fragments/nav :: nav}"></header>

    <main class="container my-5">
        <!-- Hero Section -->
        <div class="p-5 text-center bg-dark text-white rounded-3 shadow-sm mb-5" style="background-image: url('https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=2624&auto=format&fit=crop'); background-size: cover; background-position: center; position: relative;">
            <div style="background-color: rgba(0, 0, 0, 0.6); position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: inherit;"></div>
            <div class="position-relative z-index-1 py-5">
                <h1 class="display-3 fw-bold">Streetwear & Sneakers</h1>
                <p class="fs-4 mt-3 mb-4">Descubre las últimas tendencias y ediciones exclusivas.</p>
                <a href="#catalogo" class="btn btn-primary btn-lg px-4 gap-3">Ver Catálogo</a>
            </div>
        </div>

        <div id="catalogo" class="pt-4 mb-4">
            <h2 class="fw-bold border-bottom pb-2">Nuestro Catálogo</h2>
        </div>

        <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4 mt-2">
            <div class="col" th:each="producto : ${productos}">
                <article class="card h-100 shadow-sm border-0 transition-hover">
                    <div style="position: relative;">
                        <img th:if="${producto.imagenUrl != null}" th:src="${producto.imagenUrl}" class="card-img-top p-3" alt="Imagen producto" style="border-radius: 20px;">
                        <img th:unless="${producto.imagenUrl != null}" src="https://via.placeholder.com/250" class="card-img-top p-3" alt="No image">
                        <span th:if="${producto.stock <= 0}" class="badge bg-danger position-absolute top-0 start-0 m-3 fs-6">Agotado</span>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <span class="badge bg-secondary mb-2 align-self-start" th:if="${producto.categoria != null}" th:text="${producto.categoria.nombre}">Categoría</span>
                        <h5 class="card-title fw-bold" th:text="${producto.nombre}">Nombre Producto</h5>
                        <p class="card-text text-muted small flex-grow-1" th:text="${producto.descripcion}">Descripción.</p>
                        <p class="small text-muted mb-2">Stock disponible: <span th:text="${producto.stock}"></span></p>
                        <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                            <span class="fs-5 fw-bold text-success" th:text="${'$' + producto.precio}">$0.00</span>
                            <form th:action="@{/carrito/add}" method="post" class="m-0 p-0" th:if="${producto.stock > 0}">
                                <input type="hidden" name="id" th:value="${producto.id}">
                                <input type="hidden" name="cantidad" value="1">
                                <button type="submit" class="btn btn-outline-dark btn-sm rounded-pill px-3">
                                    <i class="bi bi-cart-plus"></i> Añadir
                                </button>
                            </form>
                            <button class="btn btn-secondary btn-sm rounded-pill px-3" disabled th:if="${producto.stock <= 0}">
                                Sin Stock
                            </button>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
