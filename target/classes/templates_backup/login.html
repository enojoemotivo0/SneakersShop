<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="bg-light">
    <header th:replace="~{fragments/nav :: nav}"></header>

    <main class="container my-5 text-center">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 py-4 px-3">
                    <div class="card-body">
                        <i class="bi bi-person-circle text-primary" style="font-size: 4rem;"></i>
                        <h2 class="mt-3 fw-bold mb-4">Iniciar Sesión</h2>
                        
                        <!-- Si el usuario se equivoca salta este error -->
                        <div th:if="${param.error}" class="alert alert-danger" role="alert">
                            Usuario o contraseña incorrectos.
                        </div>

                        <!-- Si el usuario se descontectó salta este este aviso -->
                        <div th:if="${param.logout}" class="alert alert-success" role="alert">
                            Has cerrado sesión correctamente.
                        </div>
                        
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3 text-start">
                                <label for="username" class="form-label">Usuario</label>
                                <input type="text" class="form-control" id="username" name="username" placeholder="Ingresa tu usuario" required autofocus>
                            </div>
                            
                            <div class="mb-4 text-start">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                            </div>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
