<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    <header th:replace="~{fragments/nav :: nav}"></header>

    <div class="page-header">
        <div class="container">
            <h1 th:text="${producto.id == null ? 'Nuevo Producto' : 'Editar Producto'}">Producto</h1>
            <p class="subtitle">Completa los datos del producto</p>
        </div>
    </div>

    <main class="container" style="padding-bottom:60px;">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <form th:action="@{/productos/guardar}" th:object="${producto}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{imagenUrl}">

                        <div class="field-group">
                            <label for="nombre" class="field-label">Nombre del producto</label>
                            <input type="text" class="field-input" id="nombre" th:field="*{nombre}"
                                   th:classappend="${#fields.hasErrors('nombre')} ? ' is-invalid'"
                                   placeholder="Ej: Air Jordan 1 Retro High OG">
                            <p class="invalid-msg" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>
                        </div>

                        <div class="field-group">
                            <label for="descripcion" class="field-label">Descripción</label>
                            <textarea class="field-input" id="descripcion" th:field="*{descripcion}" rows="3"
                                      th:classappend="${#fields.hasErrors('descripcion')} ? ' is-invalid'"
                                      placeholder="Describe el producto..."></textarea>
                            <p class="invalid-msg" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></p>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="field-group mb-0">
                                    <label for="precio" class="field-label">Precio ($)</label>
                                    <input type="number" step="0.01" class="field-input mono" id="precio" th:field="*{precio}"
                                           th:classappend="${#fields.hasErrors('precio')} ? ' is-invalid'"
                                           placeholder="0.00">
                                    <p class="invalid-msg" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></p>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="field-group mb-0">
                                    <label for="stock" class="field-label">Stock disponible</label>
                                    <input type="number" class="field-input mono" id="stock" th:field="*{stock}"
                                           th:classappend="${#fields.hasErrors('stock')} ? ' is-invalid'"
                                           placeholder="0">
                                    <p class="invalid-msg" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></p>
                                </div>
                            </div>
                        </div>

                        <div class="row g-3" style="margin-top:4px;">
                            <div class="col-md-6">
                                <div class="field-group mb-0">
                                    <label for="categoria" class="field-label">Categoría</label>
                                    <select class="field-input" id="categoria" th:field="*{categoria}"
                                            th:classappend="${#fields.hasErrors('categoria')} ? ' is-invalid'">
                                        <option value="">Seleccione una categoría</option>
                                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}">Categoría</option>
                                    </select>
                                    <p class="invalid-msg" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></p>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="field-group mb-0">
                                    <label for="talla" class="field-label">Talla</label>
                                    <input type="text" class="field-input" id="talla" th:field="*{talla}"
                                           th:classappend="${#fields.hasErrors('talla')} ? ' is-invalid'"
                                           placeholder="Ej: 42, M, XL">
                                    <p class="invalid-msg" th:if="${#fields.hasErrors('talla')}" th:errors="*{talla}"></p>
                                </div>
                            </div>
                        </div>

                        <div class="divider" style="margin: 24px 0;"></div>

                        <div class="field-group">
                            <label for="file" class="field-label"><i class="bi bi-image me-1"></i>Imagen del producto</label>
                            <input type="file" class="field-input" id="file" name="file" accept="image/*"
                                   style="padding: 8px 12px; cursor:pointer;">
                            <p style="font-size:0.72rem; color:var(--mid); margin-top:6px;">Sube una nueva imagen o mantén la actual.</p>

                            <div th:if="${producto.imagenUrl != null and !producto.imagenUrl.isEmpty()}" style="margin-top:12px; display:flex; align-items:center; gap:12px;">
                                <img th:src="${producto.imagenUrl}" alt="Imagen actual"
                                     style="width:80px; height:80px; object-fit:contain; background:var(--cream); border-radius:4px; padding:6px; border:1.5px solid var(--border);">
                                <p style="font-size:0.75rem; color:var(--mid); margin:0;">Imagen actual</p>
                            </div>
                        </div>

                        <div style="display:flex; gap:10px; margin-top:8px; flex-wrap:wrap;">
                            <button type="submit" class="btn-ink" style="padding:12px 28px;">
                                <i class="bi bi-check-lg"></i> Guardar producto
                            </button>
                            <a href="/productos" class="btn-ghost" style="padding:12px 22px;">
                                <i class="bi bi-x-lg"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
