<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
    <header th:replace="~{fragments/nav :: nav}"></header>

    <div class="page-header">
        <div class="container">
            <h1><i class="bi bi-people me-2"></i>Clientes</h1>
            <p class="subtitle">Cartera de clientes registrados</p>
        </div>
    </div>

    <main class="container" style="padding-bottom:60px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
            <p class="section-label" style="margin:0;">
                <span th:text="${#lists.size(clientes)}">0</span> clientes
            </p>
            <a href="/clientes/nuevo" class="btn-ink">
                <i class="bi bi-person-plus"></i> Nuevo Cliente
            </a>
        </div>

        <div style="background:#fff; border:1.5px solid var(--border); border-radius:4px; overflow:hidden;">
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Apellidos</th>
                            <th>Email</th>
                            <th>Teléfono</th>
                            <th>Tipo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cliente : ${clientes}">
                            <td class="mono" style="color:var(--mid); font-size:0.8rem;" th:text="${cliente.id}">1</td>
                            <td style="font-weight:600;" th:text="${cliente.nombre}">Nombre</td>
                            <td th:text="${cliente.apellidos}">Apellido</td>
                            <td style="color:var(--mid); font-size:0.85rem;" th:text="${cliente.email}">email@ejemplo.com</td>
                            <td class="mono" style="font-size:0.85rem;" th:text="${cliente.telefono}">123456789</td>
                            <td>
                                <span th:text="${cliente.tipo}"
                                      th:style="${cliente.tipo == 'VIP'} ? 'background:var(--acid); color:var(--ink); padding:3px 9px; border-radius:2px; font-size:0.65rem; font-weight:800; letter-spacing:0.1em; text-transform:uppercase;' : (${cliente.tipo == 'Premium'} ? 'background:var(--ink); color:#fff; padding:3px 9px; border-radius:2px; font-size:0.65rem; font-weight:800; letter-spacing:0.1em; text-transform:uppercase;' : 'background:var(--cream); color:var(--mid); padding:3px 9px; border-radius:2px; font-size:0.65rem; font-weight:800; letter-spacing:0.1em; text-transform:uppercase;')">Regular</span>
                            </td>
                            <td style="display:flex; gap:6px; align-items:center;">
                                <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}" class="btn-ghost" style="padding:6px 12px; font-size:0.68rem;">
                                    <i class="bi bi-pencil"></i> Editar
                                </a>
                                <a th:href="@{/clientes/eliminar/{id}(id=${cliente.id})}" class="btn-danger" style="padding:6px 12px; font-size:0.68rem;"
                                   onclick="return confirm('¿Eliminar este cliente?');">
                                    <i class="bi bi-trash3"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(clientes)}">
                            <td colspan="7" style="text-align:center; padding:40px; color:var(--mid); font-size:0.85rem;">
                                <i class="bi bi-people" style="font-size:1.8rem; display:block; margin-bottom:8px; opacity:0.3;"></i>
                                No hay clientes registrados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
