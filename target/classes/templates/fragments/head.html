<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SneakersShop — Streetwear & Sneakers exclusivos">
    <title>SneakersShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0a0a0a;
            --paper: #f5f0e8;
            --cream: #ede8dc;
            --acid: #c8f542;
            --rust: #e05a2b;
            --slate: #1e1e1e;
            --mid: #6b6b6b;
            --border: rgba(0,0,0,0.12);
            --card-bg: #ffffff;
            --radius: 4px;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 15px;
        }
        main { flex: 1; }

        /* NAV */
        .site-nav {
            background: var(--ink);
            border-bottom: 3px solid var(--acid);
            position: sticky; top: 0; z-index: 1000;
        }
        .site-nav .nav-inner {
            max-width: 1280px; margin: 0 auto;
            display: flex; align-items: stretch; height: 60px; padding: 0 24px;
        }
        .nav-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem; letter-spacing: 0.1em;
            color: var(--acid) !important; text-decoration: none;
            display: flex; align-items: center;
            padding-right: 1.5rem; border-right: 1px solid rgba(255,255,255,0.08);
        }
        .nav-links { display: flex; align-items: stretch; gap: 0; list-style: none; margin: 0 0 0 8px; padding: 0; }
        .nav-links li a {
            color: rgba(255,255,255,0.65); text-decoration: none;
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
            display: flex; align-items: center; gap: 6px;
            padding: 0 14px; height: 100%;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, background 0.2s, border-color 0.2s;
        }
        .nav-links li a:hover { color: #fff; background: rgba(255,255,255,0.04); border-bottom-color: var(--acid); }
        .nav-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        .btn-nav {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
            padding: 7px 14px; border-radius: 2px; border: 1.5px solid;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
            cursor: pointer; transition: all 0.15s; background: none; font-family: inherit;
        }
        .btn-nav-cart { border-color: var(--acid); color: var(--acid); }
        .btn-nav-cart:hover { background: var(--acid); color: var(--ink); }
        .btn-nav-login { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.75); }
        .btn-nav-login:hover { border-color: #fff; color: #fff; }
        .btn-nav-logout { border-color: rgba(224,90,43,0.4); color: var(--rust); }
        .btn-nav-logout:hover { background: var(--rust); color: #fff; border-color: var(--rust); }

        /* Admin dropdown */
        .admin-dropdown { position: relative; display: flex; align-items: stretch; }
        .admin-trigger {
            color: var(--acid); text-decoration: none; font-size: 0.72rem; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
            display: flex; align-items: center; gap: 6px; padding: 0 14px; height: 100%;
            border-bottom: 3px solid transparent; cursor: pointer;
            transition: color 0.2s, background 0.2s, border-color 0.2s;
        }
        .admin-trigger:hover, .admin-dropdown:hover .admin-trigger { background: rgba(200,245,66,0.07); border-bottom-color: var(--acid); }
        .admin-menu {
            position: absolute; top: 100%; left: 0;
            background: var(--slate); border: 1px solid rgba(255,255,255,0.08);
            border-top: 2px solid var(--acid); min-width: 210px;
            opacity: 0; pointer-events: none;
            transform: translateY(-6px); transition: all 0.2s; z-index: 999;
        }
        .admin-dropdown:hover .admin-menu { opacity: 1; pointer-events: all; transform: translateY(0); }
        .admin-menu a {
            display: flex; align-items: center; gap: 8px; padding: 11px 16px;
            color: rgba(255,255,255,0.75); text-decoration: none;
            font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
            transition: all 0.15s;
        }
        .admin-menu a:hover { background: rgba(200,245,66,0.08); color: var(--acid); }

        /* Buttons */
        .btn-ink {
            background: var(--ink); color: var(--acid);
            border: 2px solid var(--ink); font-weight: 700; font-size: 0.75rem;
            letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 22px; border-radius: 2px;
            text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.15s; cursor: pointer; font-family: inherit;
        }
        .btn-ink:hover { background: var(--acid); color: var(--ink); border-color: var(--acid); }
        .btn-ghost {
            background: transparent; color: var(--ink);
            border: 2px solid var(--ink); font-weight: 700; font-size: 0.75rem;
            letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 22px; border-radius: 2px;
            text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.15s; cursor: pointer; font-family: inherit;
        }
        .btn-ghost:hover { background: var(--ink); color: var(--paper); }
        .btn-danger {
            background: var(--rust); color: #fff;
            border: 2px solid var(--rust); font-weight: 700; font-size: 0.75rem;
            letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 16px; border-radius: 2px;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.15s; cursor: pointer; font-family: inherit;
        }
        .btn-danger:hover { background: #c44e24; border-color: #c44e24; color: #fff; }
        .btn-success {
            background: #1a6b3a; color: #fff;
            border: 2px solid #1a6b3a; font-weight: 700; font-size: 0.75rem;
            letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 22px; border-radius: 2px;
            text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.15s; cursor: pointer; font-family: inherit;
        }
        .btn-success:hover { background: #15532d; border-color: #15532d; color: #fff; }

        /* Product Card */
        .product-card {
            background: var(--card-bg); border: 1.5px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            height: 100%; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.1); border-color: var(--ink); }
        .card-img-wrap {
            background: var(--cream); padding: 20px; position: relative; overflow: hidden;
            height: 220px; display: flex; align-items: center; justify-content: center;
        }
        .card-img-wrap img { max-height: 100%; max-width: 100%; object-fit: contain; transition: transform 0.35s ease; }
        .product-card:hover .card-img-wrap img { transform: scale(1.06); }
        .stock-badge {
            position: absolute; top: 10px; left: 10px;
            background: var(--rust); color: #fff;
            font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
            padding: 4px 10px; border-radius: 2px;
        }
        .card-body-inner { padding: 16px; display: flex; flex-direction: column; flex: 1; }
        .cat-tag {
            display: inline-block; font-size: 0.62rem; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase; color: var(--mid);
            background: var(--cream); padding: 3px 9px; border-radius: 2px; margin-bottom: 8px;
        }
        .product-name { font-weight: 700; font-size: 0.92rem; line-height: 1.3; margin-bottom: 4px; }
        .product-desc { font-size: 0.78rem; color: var(--mid); line-height: 1.5; flex: 1; margin-bottom: 0; }
        .card-footer-inner {
            padding: 12px 16px; border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .product-price { font-family: 'Space Mono', monospace; font-size: 1.05rem; font-weight: 700; }
        .btn-add-cart {
            background: var(--ink); color: var(--acid); border: none;
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
            padding: 8px 14px; border-radius: 2px; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            transition: all 0.15s; font-family: inherit;
        }
        .btn-add-cart:hover { background: var(--acid); color: var(--ink); }
        .btn-no-stock {
            background: var(--cream); color: var(--mid); border: none;
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
            padding: 8px 14px; border-radius: 2px; cursor: not-allowed;
        }

        /* Page header */
        .page-header {
            background: var(--ink); color: var(--paper);
            padding: 44px 0 36px; margin-bottom: 40px; position: relative; overflow: hidden;
        }
        .page-header::after {
            content: ''; position: absolute; right: -80px; top: -80px;
            width: 350px; height: 350px; background: var(--acid);
            opacity: 0.04; border-radius: 50%;
        }
        .page-header .container { position: relative; z-index: 1; }
        .page-header h1 {
            font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem;
            letter-spacing: 0.05em; line-height: 1; margin-bottom: 4px;
        }
        .page-header .subtitle { color: rgba(255,255,255,0.45); font-size: 0.82rem; letter-spacing: 0.04em; }

        /* Data Table */
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .data-table thead th {
            background: var(--ink); color: var(--acid);
            font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
            padding: 14px 16px; border: none; white-space: nowrap;
        }
        .data-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
        .data-table tbody tr:hover { background: var(--cream); }
        .data-table tbody td { padding: 12px 16px; vertical-align: middle; color: var(--ink); }

        /* Form card */
        .form-card { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 40px; }
        .field-group { margin-bottom: 20px; }
        .field-label {
            display: block; font-size: 0.68rem; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase; color: var(--mid); margin-bottom: 7px;
        }
        .field-input {
            width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
            border-radius: var(--radius); font-size: 0.88rem;
            background: var(--paper); color: var(--ink); transition: border-color 0.15s;
            outline: none; font-family: inherit;
        }
        .field-input:focus { border-color: var(--ink); background: #fff; }
        .field-input.is-invalid { border-color: var(--rust); }
        .invalid-msg { font-size: 0.75rem; color: var(--rust); margin-top: 4px; }

        /* Alerts */
        .alert-info { background: #f0f9ff; border-left: 4px solid #3b82f6; color: #1e40af; padding: 14px 18px; border-radius: var(--radius); font-size: 0.85rem; }
        .alert-error { background: #fff1f0; border-left: 4px solid var(--rust); color: #9b1c1c; padding: 14px 18px; border-radius: var(--radius); font-size: 0.85rem; }
        .alert-success { background: #f0fdf4; border-left: 4px solid #22c55e; color: #14532d; padding: 14px 18px; border-radius: var(--radius); font-size: 0.85rem; }

        /* Pagination */
        .pagination-wrap { display: flex; gap: 4px; justify-content: center; list-style: none; padding: 0; margin: 24px 0 0; }
        .pagination-wrap li a, .pagination-wrap li span {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; font-size: 0.78rem; font-weight: 700;
            border: 1.5px solid var(--border); border-radius: 2px;
            text-decoration: none; color: var(--ink); transition: all 0.15s;
        }
        .pagination-wrap li.active a { background: var(--ink); color: var(--acid); border-color: var(--ink); }
        .pagination-wrap li a:hover { background: var(--ink); color: var(--acid); border-color: var(--ink); }
        .pagination-wrap li.disabled span { opacity: 0.3; }

        /* Footer */
        .site-footer {
            background: var(--ink); color: rgba(255,255,255,0.35);
            padding: 28px 0; border-top: 3px solid var(--acid);
        }
        .site-footer .footer-brand {
            font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
            letter-spacing: 0.1em; color: var(--acid);
        }

        /* Utils */
        .divider { height: 1px; background: var(--border); margin: 20px 0; }
        .mono { font-family: 'Space Mono', monospace; }
        .section-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mid); }
        .tag-new { background: var(--acid); color: var(--ink); font-size: 0.6rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; }
    </style>
</head>
<body>
</body>
</html>
