<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body style="background: var(--ink);">

    <main style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding: 40px 16px; position:relative; overflow:hidden;">
        <!-- Decorative background text -->
        <div style="position:absolute; bottom:0; left:0; right:0; font-family:'Bebas Neue',sans-serif; font-size:22vw; line-height:0.85; color:rgba(200,245,66,0.03); text-align:center; pointer-events:none; user-select:none; letter-spacing:0.05em;">LOGIN</div>

        <div style="width:100%; max-width:420px; position:relative; z-index:1;">
            <!-- Brand -->
            <div style="text-align:center; margin-bottom:32px;">
                <a href="/" style="font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:0.1em; color:var(--acid); text-decoration:none;">
                    <i class="bi bi-lightning-charge-fill me-1"></i>SneakersShop
                </a>
                <p style="color:rgba(255,255,255,0.3); font-size:0.78rem; margin-top:6px; letter-spacing:0.08em; text-transform:uppercase;">Acceso al sistema</p>
            </div>

            <div style="background:#161616; border:1.5px solid rgba(255,255,255,0.08); border-top:3px solid var(--acid); border-radius:4px; padding:36px 32px;">

                <div th:if="${param.error}" class="alert-error mb-4">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>Usuario o contraseña incorrectos.
                </div>
                <div th:if="${param.logout}" class="alert-success mb-4">
                    <i class="bi bi-check-circle-fill me-2"></i>Has cerrado sesión correctamente.
                </div>

                <form th:action="@{/login}" method="post">
                    <!-- Token CSRF explícito por si Thymeleaf no lo inyecta automáticamente -->
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
                    
                    <div class="field-group">
                        <label for="username" class="field-label" style="color:rgba(255,255,255,0.4);">Usuario</label>
                        <input type="text" class="field-input" id="username" name="username"
                               placeholder="Ingresa tu usuario" required autofocus
                               style="background:#0a0a0a; border-color:rgba(255,255,255,0.1); color:#fff;">
                    </div>

                    <div class="field-group">
                        <label for="password" class="field-label" style="color:rgba(255,255,255,0.4);">Contraseña</label>
                        <input type="password" class="field-input" id="password" name="password"
                               placeholder="Ingresa tu contraseña" required
                               style="background:#0a0a0a; border-color:rgba(255,255,255,0.1); color:#fff;">
                    </div>

                    <button type="submit" class="btn-ink w-100 justify-content-center" style="padding:13px; font-size:0.82rem; margin-top:8px;">
                        <i class="bi bi-arrow-right-circle"></i> Entrar
                    </button>
                </form>

                <div style="margin-top:24px; text-align:center;">
                    <a href="/" style="color:rgba(255,255,255,0.25); font-size:0.75rem; text-decoration:none; letter-spacing:0.05em;">
                        <i class="bi bi-arrow-left me-1"></i>Volver a la tienda
                    </a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
